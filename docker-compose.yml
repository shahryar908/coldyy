services:
  web:
    build: ./frontend
    ports:
      - '3000:80'
    depends_on:
      - api

  api:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/mydatabase
    depends_on:
      - db

  db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydatabase
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
    driver: local
